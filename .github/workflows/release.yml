name: Auto Release on Version Bump

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - vd-store-whatsapp-gateway.php

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version bump
        id: version
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(awk '/^[[:space:]]*\*[[:space:]]*Version:/ { print $3; exit }' vd-store-whatsapp-gateway.php)"
          CONSTANT_VERSION="$(sed -n "s/.*define('VD_STORE_WA_GATEWAY_VERSION',[[:space:]]*'\([^']*\)').*/\1/p" vd-store-whatsapp-gateway.php | head -n 1)"

          if [[ ! "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid plugin version: $CURRENT_VERSION" >&2
            exit 1
          fi

          if [[ "$CURRENT_VERSION" != "$CONSTANT_VERSION" ]]; then
            echo "Plugin header ($CURRENT_VERSION) and VD_STORE_WA_GATEWAY_VERSION ($CONSTANT_VERSION) do not match." >&2
            exit 1
          fi

          SHOULD_RELEASE=true

          if [[ "${{ github.event_name }}" == "push" ]]; then
            BEFORE="${{ github.event.before }}"
            PREVIOUS_VERSION=""

            if [[ -n "$BEFORE" && ! "$BEFORE" =~ ^0+$ ]]; then
              PREVIOUS_SOURCE="$(git show "${BEFORE}:vd-store-whatsapp-gateway.php" 2>/dev/null || true)"
              PREVIOUS_VERSION="$(printf '%s' "$PREVIOUS_SOURCE" | awk '/^[[:space:]]*\*[[:space:]]*Version:/ { print $3; exit }')"
            fi

            echo "Previous version: ${PREVIOUS_VERSION:-not found}"
            echo "Current version: $CURRENT_VERSION"

            if [[ -n "$PREVIOUS_VERSION" ]]; then
              if [[ "$CURRENT_VERSION" == "$PREVIOUS_VERSION" ]]; then
                SHOULD_RELEASE=false
              elif [[ "$(printf '%s\n%s\n' "$PREVIOUS_VERSION" "$CURRENT_VERSION" | sort -V | tail -n 1)" != "$CURRENT_VERSION" ]]; then
                echo "Version must increase; downgrade from $PREVIOUS_VERSION to $CURRENT_VERSION is not allowed." >&2
                exit 1
              fi
            fi
          fi

          if git rev-parse --quiet --verify "refs/tags/v${CURRENT_VERSION}" >/dev/null; then
            echo "Tag v${CURRENT_VERSION} already exists; skipping release."
            SHOULD_RELEASE=false
          fi

          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        if: steps.version.outputs.should_release == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Lint PHP files
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        run: git ls-files '*.php' -z | xargs -0 -n 1 php -l

      - name: Build plugin ZIP
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          PLUGIN_DIR="build/vd-store-whatsapp-gateway"
          ZIP_PATH="dist/vd-store-whatsapp-gateway-${VERSION}.zip"

          mkdir -p "$PLUGIN_DIR" dist
          cp -R src vd-store-whatsapp-gateway.php "$PLUGIN_DIR/"
          (
            cd build
            zip -qr "../${ZIP_PATH}" vd-store-whatsapp-gateway
          )

          unzip -t "$ZIP_PATH"

      - name: Create GitHub release
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            "dist/vd-store-whatsapp-gateway-${VERSION}.zip" \
            --title "v${VERSION}" \
            --generate-notes
